name: Build & Redeploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'master-doc/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build Docker Image
    # NEXT_PUBLIC_* are baked into the client bundle at build time, so they are
    # passed as --build-args here from GitHub Variables/Secrets — never hardcoded
    # in the Dockerfile. An unset variable bakes empty (its feature stays disabled),
    # so this is safe to run before the variables are provisioned.
    if: ${{ github.event_name != 'push' || (!contains(github.event.head_commit.message, '[skip ci]') && !startsWith(github.event.head_commit.message, 'docs:') && !startsWith(github.event.head_commit.message, 'docs(') && !startsWith(github.event.head_commit.message, 'doc:')) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
        with:
          driver: docker
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_GATEWAY_URL=${{ vars.NEXT_PUBLIC_GATEWAY_URL }}
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_DOCS_URL=${{ vars.NEXT_PUBLIC_DOCS_URL }}
            NEXT_PUBLIC_OIDC_CLIENT_ID=${{ vars.NEXT_PUBLIC_OIDC_CLIENT_ID }}
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ vars.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_POSTHOG_KEY=${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}

  deploy:
    name: Redeploy on Server
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: self-hosted
    needs: build-and-push
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Pull image & restart container
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          # Runtime env consumed by the BFF (server-side). These are the ONLY
          # non-NEXT_PUBLIC vars the app reads at runtime (verified against the
          # source); everything else is baked at build or set by the Dockerfile.
          TWITTER_CLIENT_ID: ${{ vars.TWITTER_CLIENT_ID }}
          TWITTER_REDIRECT_URI: ${{ vars.TWITTER_REDIRECT_URI }}
        run: |
          set -e
          docker network create sentinel-net 2>/dev/null || true
          echo "NODE_ENV=production" > .env.production
          # Written only when set, so an unset variable never injects an empty key.
          [ -n "${TWITTER_CLIENT_ID}" ] && echo "TWITTER_CLIENT_ID=${TWITTER_CLIENT_ID}" >> .env.production
          [ -n "${TWITTER_REDIRECT_URI}" ] && echo "TWITTER_REDIRECT_URI=${TWITTER_REDIRECT_URI}" >> .env.production
          chmod 600 .env.production
          echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
          docker stop sentinel-frontend 2>/dev/null || true
          docker rm sentinel-frontend 2>/dev/null || true
          docker compose pull sentinel-frontend
          docker compose up -d sentinel-frontend
          docker image prune -f
          echo "sentinel-frontend redeployed"
