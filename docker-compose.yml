services:
  sentinel-frontend:
    image: ghcr.io/fortiqo-network/sentinel-frontend:latest
    container_name: sentinel-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.production

  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      DOZZLE_FILTER: "name=sentinel-frontend"

networks:
  default:
    name: sentinel-net
    external: true
